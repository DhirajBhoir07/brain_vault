<div class="login-container d-flex align-items-center justify-content-end">

    <!-- Login Card -->
    <div class="login-card card shadow-lg p-4">
        <h3 class="text-center text-warning mb-4 fw-bold">Login to BrainVault</h3>
        <form (ngSubmit)="onLogin()" #loginForm="ngForm">

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" [(ngModel)]="loginData.username" required
                    placeholder="Enter username">
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" [(ngModel)]="loginData.password" required
                    placeholder="Enter password">
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-warning w-100 fw-bold">
                Login
            </button>

            <!-- Register -->
            <div class="text-center mt-3">
                <span>Don't have an account? </span>
                <a routerLink="/register" class="register-link">Register Now</a>
            </div>

        </form>
    </div>

</div>
